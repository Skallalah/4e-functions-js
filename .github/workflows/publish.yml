name: Publish release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 20.15.1

      - name: Install dependencies
        run: npm install

      - name: Extract tag version number
        id: get_version
        uses: battila7/get-version-action@v2

      - name: Stamp version into module.json
        working-directory: src
        env:
          VERSION: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'module.json';
            const m = JSON.parse(fs.readFileSync(path, 'utf8'));
            m.version = process.env.VERSION;
            m.manifest = 'https://github.com/' + process.env.REPO + '/releases/latest/download/module.json';
            m.download = 'https://github.com/' + process.env.REPO + '/releases/download/' + process.env.VERSION + '/module.zip';
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
            console.log('Stamped module.json version =', m.version);
          "

      - name: Create zip archive
        working-directory: src
        run: zip -r ./module.zip module.json style.css scripts/ languages/

      - name: Update release with files
        id: create_version_release
        uses: ncipollo/release-action@v1.14.0
        with:
          allowUpdates: true # Set this to false if you want to prevent updating existing releases
          name: ${{ github.event.release.name }}
          draft: ${{ github.event.release.unpublished }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./src/module.json, ./src/module.zip"
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
